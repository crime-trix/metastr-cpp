name: ci

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -B build -DMETASTR_BUILD_EXAMPLES=ON -DMETASTR_BUILD_TESTS=ON
      - run: cmake --build build --config Release
      - run: ctest --test-dir build -C Release --output-on-failure
      - run: .\build\Release\metastr-basic.exe
      - run: .\build\Release\metastr-scoped.exe
      - run: .\build\Release\metastr-manual-blob.exe
      - run: .\build\Release\metastr-app-strings.exe
      - run: cmake --install build --config Release --prefix install
      - run: cmake -S tests/consumer -B build-consumer -DCMAKE_PREFIX_PATH="${{ github.workspace }}\install"
      - run: cmake --build build-consumer --config Release
      - run: .\build-consumer\Release\metastr-consumer.exe
